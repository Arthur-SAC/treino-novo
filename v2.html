<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Minha Jornada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/workout.css">
  <link rel="stylesheet" href="css/body.css">
  <link rel="stylesheet" href="css/nutrition.css">
  <link rel="stylesheet" href="css/care.css">
</head>
<body>

  <!-- Page: Home -->
  <main class="page page--active" id="page-home">
    <header class="page__header">
      <h1 id="home-greeting"></h1>
      <p id="home-day" class="text-muted"></p>
    </header>

    <div id="silhouette-mount"></div>

    <section id="todo-list" class="task-section">
      <h2>A fazer</h2>
      <div id="todo-items"></div>
    </section>

    <section id="done-list" class="task-section">
      <h2>Feitos</h2>
      <div id="done-items"></div>
    </section>
  </main>

  <!-- Page: Treino -->
  <main class="page" id="page-treino">
    <div id="workout-container"></div>
  </main>

  <!-- Page: Corpo -->
  <main class="page" id="page-corpo">
    <!-- Tabs -->
    <nav class="corpo-tabs" role="tablist" aria-label="Secoes do corpo">
      <button class="corpo-tab corpo-tab--active" data-corpo-tab="medidas" role="tab" aria-selected="true">Medidas</button>
      <button class="corpo-tab" data-corpo-tab="fase" role="tab" aria-selected="false">Minha Fase</button>
      <button class="corpo-tab" data-corpo-tab="estilo" role="tab" aria-selected="false">Estilo</button>
    </nav>

    <!-- Panel: Medidas (BodyManager) -->
    <div class="corpo-tab-panel corpo-tab-panel--active" id="corpo-panel-medidas" role="tabpanel">
      <div id="corpo-container">
        <p class="body-empty">Carregando...</p>
      </div>
    </div>

    <!-- Panel: Fase (PhaseManager) -->
    <div class="corpo-tab-panel" id="corpo-panel-fase" role="tabpanel">
      <div id="phase-container" style="padding:var(--space-4)"></div>
    </div>

    <!-- Panel: Estilo (StyleManager) -->
    <div class="corpo-tab-panel" id="corpo-panel-estilo" role="tabpanel">
      <div id="style-container" style="padding:var(--space-4)"></div>
    </div>
  </main>

  <!-- Page: Menu -->
  <main class="page" id="page-menu">
    <div id="menu-container">
      <h2>Menu</h2>
      <div id="menu-grid" class="menu-grid"></div>
    </div>
  </main>

  <!-- Overlay: Exercise Modal -->
  <div id="exercise-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div id="modal-backdrop" class="modal__backdrop"></div>
    <div id="modal-content" class="modal__content"></div>
  </div>

  <!-- Overlay: Timer -->
  <div id="timer-overlay" class="timer-overlay hidden">
    <div class="timer-overlay__circle">
      <span id="timer-display"></span>
    </div>
    <button id="timer-skip" class="btn btn--ghost">Pular</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="nav-bottom" role="navigation" aria-label="Navegacao principal">
    <button class="nav-bottom__item nav-bottom__item--active" data-page="home" aria-label="Inicio">
      <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 13 15 13 15 21"/>
      </svg>
      <span>Inicio</span>
    </button>

    <button class="nav-bottom__item" data-page="treino" aria-label="Treino">
      <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="9" height="9" rx="1"/>
        <rect x="13" y="2" width="9" height="9" rx="1"/>
        <rect x="2" y="13" width="9" height="9" rx="1"/>
        <rect x="13" y="13" width="9" height="9" rx="1"/>
      </svg>
      <span>Treino</span>
    </button>

    <button class="nav-bottom__item" data-page="corpo" aria-label="Corpo">
      <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 9v6"/>
        <path d="M9 12l-3 5"/>
        <path d="M15 12l3 5"/>
        <path d="M9 15l3 4 3-4"/>
      </svg>
      <span>Corpo</span>
    </button>

    <button class="nav-bottom__item" data-page="menu" aria-label="Menu">
      <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span>Menu</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="data/schedule.js"></script>
  <script src="data/exercises.js"></script>
  <script src="data/warmup-cooldown.js"></script>
  <script src="data/meals.js"></script>
  <script src="data/skincare.js"></script>
  <script src="data/hair.js"></script>
  <script src="data/style.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/silhouette.js"></script>
  <script src="js/home.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/care.js"></script>
  <script src="js/body.js"></script>
  <script src="js/phase.js"></script>
  <script src="js/style.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
