<!DOCTYPE html>
<html>
<head><title>Gerador de Icones PWA</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;text-align:center;padding:40px">
<h1>Gerador de Icones PWA</h1>
<p>Clique no botao para gerar e baixar os icones PNG.</p>
<button id="gen" style="font-size:1.2rem;padding:12px 24px;cursor:pointer">Gerar Icones</button>
<div id="preview" style="margin-top:20px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap"></div>
<script>
function generateIcon(size, filename) {
  var canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  var r = size * 0.16;
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();
  ctx.font = (size * 0.55) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\uD83E\uDD8B', size / 2, size / 2 + size * 0.05);
  return { canvas: canvas, filename: filename };
}
function generateMaskable(size, filename) {
  var canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, size, size);
  ctx.font = (size * 0.45) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\uD83E\uDD8B', size / 2, size / 2 + size * 0.03);
  return { canvas: canvas, filename: filename };
}
function download(canvas, filename) {
  var a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
document.getElementById('gen').onclick = function() {
  var icons = [
    generateIcon(192, 'icon-192.png'),
    generateIcon(512, 'icon-512.png'),
    generateMaskable(192, 'icon-maskable-192.png'),
    generateMaskable(512, 'icon-maskable-512.png')
  ];
  var preview = document.getElementById('preview');
  preview.innerHTML = '';
  icons.forEach(function(icon, i) {
    var div = document.createElement('div');
    div.innerHTML = '<p>' + icon.filename + '</p>';
    var img = document.createElement('img');
    img.src = icon.canvas.toDataURL('image/png');
    img.style.width = '96px';
    img.style.border = '1px solid #555';
    div.appendChild(img);
    preview.appendChild(div);
    setTimeout(function() { download(icon.canvas, icon.filename); }, i * 500);
  });
};
</script>
</body>
</html>
